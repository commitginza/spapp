<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>アシスト人事評価制度</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* スクロールはiframe内に任せる */
      background-color: #f6f7fb;
    }

    /* ローディング表示 */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 10;
    }

    .loader {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(0,0,0,.1);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PDF表示エリア */
    .pdf-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    iframe {
      flex-grow: 1;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 下部の閉じるボタン（任意） */
    .footer {
      padding: 12px;
      background: #fff;
      border-top: 1px solid #e9e9ef;
      text-align: center;
    }

    .btn-close {
      background: #111;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loader"></div>
    <div style="font-size: 14px; color: #666;">資料を読み込み中...</div>
  </div>

  <div class="pdf-container">
    <div id="pdfWrapper" style="width:100%; height:100%;">
      </div>
  </div>

  <script>
    // --- 設定項目 ---
    const LIFF_ID = '2009200776-u1mLDQRu'; // あなたのLIFF ID
    const PDF_URL = 'https://commitginza.github.io/spapp/assist_salespromotion_20260303.pdf'; // 表示したいPDFの直リンクURL

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // GoogleビューアーのURLを構築
        // embedded=true をつけることでUIをシンプルにします
        const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(PDF_URL)}&embedded=true`;

        // iframeの生成
        const wrapper = document.getElementById('pdfWrapper');
        const iframe = document.createElement('iframe');
        iframe.src = viewerUrl;
        
        // 読み込み完了したらローディングを消す
        iframe.onload = () => {
          document.getElementById('loading').style.display = 'none';
        };

        wrapper.appendChild(iframe);

      } catch (err) {
        console.error(err);
        alert("エラーが発生しました: " + err.message);
      }
    }

    init();
  </script>
</body>

</html>
