<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>メンバーズカード</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --radius: 22px;
      --shadow: 0 16px 40px rgba(0,0,0,.10);
      --border: rgba(255,255,255,.28);
    }

    body {
      font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7fb;
    }

    .wrap { max-width: 520px; margin: 0 auto; }

    /* ===== Member Card ===== */
    .member-card {
      position: relative;
      border-radius: var(--radius);
      padding: 18px 18px 16px 18px;
      color: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      min-height: 220px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .member-card::before{
      content:"";
      position:absolute;
      inset:-40% -40% auto auto;
      width: 260px;
      height: 260px;
      transform: rotate(18deg);
      background: rgba(255,255,255,.18);
      border-radius: 999px;
      pointer-events: none;
    }

    .member-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 55%),
        repeating-linear-gradient(135deg, rgba(255,255,255,.10) 0 2px, rgba(255,255,255,0) 2px 10px);
      opacity:.22;
      pointer-events:none;
      mix-blend-mode: soft-light;
    }

    .top {
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .name {
      font-weight: 800;
      letter-spacing: .02em;
      font-size: 18px;
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0,0,0,.18);
    }

    .sub {
      font-size: 12px;
      opacity: .92;
      margin-top: 6px;
    }

    .center {
      display:flex;
      align-items:center;
      justify-content:center;
      position: relative;
      z-index: 1;
    }

    .rank-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 16px 22px;
      border-radius: 999px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.26);
      backdrop-filter: blur(6px);
      font-weight: 900;
      letter-spacing: .08em;
      font-size: 42px;
      line-height: 1;
      min-width: 150px;
      text-shadow: 0 2px 18px rgba(0,0,0,.20);
    }

    .bottom {
      display:flex;
      align-items:flex-end;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .points {
      font-weight: 900;
      font-size: 22px;
      letter-spacing: .02em;
      text-shadow: 0 2px 12px rgba(0,0,0,.18);
    }

    .points small{
      font-size: 12px;
      opacity: .92;
      margin-left: 6px;
      font-weight: 700;
      letter-spacing: .06em;
    }

    /* ===== Notice ===== */
    .notice-wrap{
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .notice-panel{
      background: #fff;
      border: 1px solid #e9e9ef;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.06);
    }

    .notice-head{
      display:flex;
      align-items:flex-end;
      justify-content: space-between;
      gap: 10px;
    }

    .notice-title{
      font-weight: 900;
      font-size: 16px;
      margin: 0;
      color:#111;
      line-height: 1.25;
    }

    .notice-meta{
      font-size: 12px;
      color:#666;
      white-space: nowrap;
    }

    .notice-body{
      margin-top: 10px;
      color:#222;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap; /* 改行を反映 */
      word-break: break-word;
    }

    .notice-link{
      margin-top: 10px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #2563eb;
      text-decoration: none;
    }
    .notice-link:active{ opacity:.75; }

    /* register UI */
    .panel {
      background: #fff;
      border: 1px solid #e9e9ef;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.06);
    }

    label { font-size: 12px; color:#333; display:block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid #d9d9e3;
      outline: none;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin-top: 12px;
      background: #111;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
    }
    button:disabled{ opacity:.6; cursor: not-allowed; }

    .muted { color:#666; font-size: 12px; }
    .error { color:#b00020; font-size: 13px; margin-top: 10px; }

    /* ===== Rank Colors ===== */
    .rank-a5 { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #60a5fa 100%); }
    .rank-a4 { background: linear-gradient(135deg, #14532d 0%, #16a34a 60%, #86efac 100%); }
    .rank-a3 { background: linear-gradient(135deg, #854d0e 0%, #eab308 60%, #fde047 100%); color:#1b1b1b; }
    .rank-a2 { background: linear-gradient(135deg, #7c2d12 0%, #f97316 60%, #fdba74 100%); }
    .rank-a1 { background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 60%, #fca5a5 100%); }

    .rank-a3 .rank-badge { background: rgba(255,255,255,.35); border-color: rgba(0,0,0,.10); }
    .rank-a3 .member-card::before{ background: rgba(255,255,255,.35); }
    .rank-a3 .member-card::after{ opacity:.18; }

    /* Views */
    #loadingView { padding: 18px 6px; }
    #registerView { display:none; }
    #memberView { display:none; }
    #noticeView { display:none; }
    #errorView { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loadingView">
      <div class="muted">読み込み中…</div>
    </div>

    <!-- Existing member card + notices -->
    <div id="memberView">
      <div id="card" class="member-card rank-a5">
        <div class="top">
          <div>
            <div class="name" id="name">-</div>
            <div class="sub muted" style="color:rgba(255,255,255,.92)">Members Card</div>
          </div>
        </div>

        <div class="center">
          <div class="rank-badge" id="rankBadge">A5</div>
        </div>

        <div class="bottom">
          <div class="points" id="points">0P <small>POINTS</small></div>
          <div class="muted" style="color:rgba(255,255,255,.92)">Football Assist</div>
        </div>
      </div>

      <!-- Notices -->
      <div id="noticeView" class="notice-wrap"></div>
    </div>

    <!-- New member register -->
    <div id="registerView" class="panel">
      <h3 style="margin:0 0 12px 0;">初回登録</h3>

      <div class="muted">はじめに氏名をご入力ください。</div>

      <div style="margin-top:12px;">
        <label>姓</label>
        <input id="lastName" autocomplete="family-name" />
      </div>

      <div style="margin-top:12px;">
        <label>名</label>
        <input id="firstName" autocomplete="given-name" />
      </div>

      <button id="saveBtn">登録する</button>
      <div id="regMsg" class="error"></div>
    </div>

    <div id="errorView" class="panel">
      <div class="error" style="margin-top:0;">エラーが発生しました</div>
      <div id="errMsg" class="muted" style="margin-top:8px;"></div>
    </div>
  </div>

<script>
const LIFF_ID = '2009200776-bffw4Fd6';
const API_URL = 'https://vqzc369jaa.execute-api.ap-northeast-1.amazonaws.com/member';

// ログ出力は不要のためコメントアウト
// function log(msg) {
//   console.log(msg);
// }

function showOnly(viewId) {
  const ids = ['loadingView', 'memberView', 'registerView', 'errorView'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = (id === viewId) ? 'block' : 'none';
  });
}

async function post(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload }),
  });

  const text = await res.text();
  try { return JSON.parse(text); }
  catch { throw new Error('APIがJSONを返していません'); }
}

function normalizeRank(rank) {
  // デフォルトA5
  const r = (rank || '').toString().trim().toUpperCase();
  return ['A1','A2','A3','A4','A5'].includes(r) ? r : 'A5';
}

function rankClass(rank) {
  switch (rank) {
    case 'A1': return 'rank-a1';
    case 'A2': return 'rank-a2';
    case 'A3': return 'rank-a3';
    case 'A4': return 'rank-a4';
    case 'A5':
    default:   return 'rank-a5';
  }
}

function renderCard(member) {
  const last = (member?.lastName || '').trim();
  const first = (member?.firstName || '').trim();
  const fullName = `${last} ${first}`.trim() || '-';

  const pointVal = (member?.point ?? 0);
  const pointNum = Number.isFinite(Number(pointVal)) ? Number(pointVal) : 0;

  const rank = normalizeRank(member?.rank);
  const card = document.getElementById('card');

  card.classList.remove('rank-a1','rank-a2','rank-a3','rank-a4','rank-a5');
  card.classList.add(rankClass(rank));

  document.getElementById('name').textContent = fullName;
  document.getElementById('rankBadge').textContent = rank;
  document.getElementById('points').textContent = `${pointNum}P`;
}

function showRegister() {
  showOnly('registerView');
  document.getElementById('regMsg').textContent = '';
  document.getElementById('lastName').value = '';
  document.getElementById('firstName').value = '';
  setTimeout(() => document.getElementById('lastName').focus(), 50);
}

function showError(msg) {
  showOnly('errorView');
  document.getElementById('errMsg').textContent = msg || '不明なエラー';
}

function fmtPeriod(startAt, endAt) {
  const s = (startAt || '').toString().trim();
  const e = (endAt || '').toString().trim();
  if (!s && !e) return '';
  if (s && e) return `${s} 〜 ${e}`;
  if (s) return `${s} 〜`;
  return `〜 ${e}`;
}

function escapeHtml(str) {
  return String(str ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderNotices(notices) {
  const wrap = document.getElementById('noticeView');
  wrap.innerHTML = '';

  if (!Array.isArray(notices) || notices.length === 0) {
    wrap.style.display = 'none';
    return;
  }

  wrap.style.display = 'grid';

  // 最大3件表示（必要なら変更）
  const list = notices.slice(0, 3);

  list.forEach(n => {
    const title = escapeHtml(n.title || 'お知らせ');
    const body = escapeHtml(n.body || '');
    const url = (n.url || '').toString().trim();
    const period = escapeHtml(fmtPeriod(n.startAt, n.endAt));

    const panel = document.createElement('div');
    panel.className = 'notice-panel';

    panel.innerHTML = `
      <div class="notice-head">
        <h4 class="notice-title">${title}</h4>
        <div class="notice-meta">${period}</div>
      </div>
      <div class="notice-body">${body}</div>
      ${url ? `<a class="notice-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">詳細を見る</a>` : ``}
    `;

    wrap.appendChild(panel);
  });
}

async function init() {
  try {
    showOnly('loadingView');

    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const accessToken = liff.getAccessToken();
    if (!accessToken) throw new Error('accessTokenが取得できません');

    // 1) 会員情報
    const me = await post('me', { accessToken });

    if (!me || me.ok !== true) {
      throw new Error(me?.error ? `APIエラー: ${me.error}` : 'APIエラー');
    }

    if (me.status === 'new') {
      // 新規登録（lineid未登録）→ 登録後そのまま姓名入力
      showRegister();
      return;
    }

    showOnly('memberView');
    renderCard(me.member);

    // 2) お知らせ（共通）
    // Lambda側で action:"notices" を実装したら動きます
    // 未実装の場合はエラーになるので握りつぶします（会員カード表示は継続）
    try {
      const noticeRes = await post('notices', { accessToken });
      if (noticeRes && noticeRes.ok === true) {
        renderNotices(noticeRes.notices || []);
      } else {
        renderNotices([]);
      }
    } catch (_) {
      renderNotices([]);
    }

  } catch (e) {
    console.error(e);
    showError(e?.message || String(e));
  }
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  try {
    const lastName = document.getElementById('lastName').value.trim();
    const firstName = document.getElementById('firstName').value.trim();
    const regMsg = document.getElementById('regMsg');
    regMsg.textContent = '';

    if (!lastName || !firstName) {
      regMsg.textContent = '姓・名を入力してください。';
      return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '登録中…';

    const accessToken = liff.getAccessToken();
    if (!accessToken) throw new Error('accessTokenが取得できません');

    const saved = await post('registerName', { accessToken, lastName, firstName });

    if (!saved || saved.ok !== true) {
      regMsg.textContent = saved?.error ? `登録失敗: ${saved.error}` : '登録に失敗しました。';
      btn.disabled = false;
      btn.textContent = '登録する';
      return;
    }

    // registerName が member を返す場合はそれを採用、無ければ me で再取得
    let member = saved.member;
    if (!member) {
      const me = await post('me', { accessToken });
      if (!me || me.ok !== true) throw new Error(me?.error ? `APIエラー: ${me.error}` : 'APIエラー');
      member = me.member;
    }

    showOnly('memberView');
    renderCard(member);

    // 登録直後にもお知らせ取得（共通）
    try {
      const noticeRes = await post('notices', { accessToken });
      if (noticeRes && noticeRes.ok === true) {
        renderNotices(noticeRes.notices || []);
      } else {
        renderNotices([]);
      }
    } catch (_) {
      renderNotices([]);
    }

  } catch (e) {
    console.error(e);
    document.getElementById('regMsg').textContent = e?.message || String(e);
  } finally {
    const btn = document.getElementById('saveBtn');
    btn.disabled = false;
    btn.textContent = '登録する';
  }
});

init();
</script>
</body>
</html>
