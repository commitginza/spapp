<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>メンバーズカード</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif; margin: 24px; }
    .card { border: 1px solid #e5e5e5; border-radius: 14px; padding: 16px; max-width: 520px; }
    .row { display:flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f2f2f2; }
    .row:last-child { border-bottom: none; }
    input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    button { padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; }
    .mt { margin-top: 12px; }
    .muted { color:#666; font-size: 12px; }
    .error { color:#b00020; }
  </style>
</head>
<body>
  <div class="card">
    <!-- ログ表示は不要のためコメントアウト
    <div id="status" style="white-space:pre-wrap;font-family:monospace;"></div>
    -->

    <div id="loadingView">
      <div>読み込み中…</div>
      <div class="muted mt">しばらくお待ちください</div>
    </div>

    <div id="memberView" style="display:none;">
      <h3>会員情報</h3>
      <div class="row"><div>氏名</div><div id="name"></div></div>
      <div class="row"><div>ポイント</div><div id="point"></div></div>
      <div class="row"><div>ランク</div><div id="rank"></div></div>
    </div>

    <div id="registerView" style="display:none;">
      <h3>初回登録</h3>
      <div class="mt">
        <label>姓</label>
        <input id="lastName" autocomplete="family-name" />
      </div>
      <div class="mt">
        <label>名</label>
        <input id="firstName" autocomplete="given-name" />
      </div>
      <button class="mt" id="saveBtn">登録する</button>
      <div class="mt muted">※登録後は会員情報が表示されます</div>
      <div class="mt error" id="regMsg"></div>
    </div>

    <div id="errorView" style="display:none;">
      <div class="error">エラーが発生しました。</div>
      <div class="mt muted" id="errMsg"></div>
    </div>
  </div>

<script>
const LIFF_ID = '2009200776-bffw4Fd6';
const GAS_URL = 'https://vqzc369jaa.execute-api.ap-northeast-1.amazonaws.com/member';

// ログ出力は不要のためコメントアウト（必要になったら復活）
// function log(msg) {
//   const el = document.getElementById('status');
//   const now = new Date().toISOString().slice(11, 19); // HH:MM:SS
//   el.textContent += `[${now}] ${msg}\n`;
// }

function showOnly(viewId) {
  const ids = ['loadingView', 'memberView', 'registerView', 'errorView'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = (id === viewId) ? 'block' : 'none';
  });
}

async function post(action, payload = {}) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload }),
  });

  const text = await res.text();
  // JSONに変換できる場合だけ変換
  try { return JSON.parse(text); }
  catch { throw new Error('APIがJSONを返していません'); }
}

function showMember(member) {
  showOnly('memberView');
  document.getElementById('name').textContent = `${member.lastName} ${member.firstName}`.trim() || '-';
  document.getElementById('point').textContent = member.point ?? 0;
  document.getElementById('rank').textContent = member.rank || '-';
}

function showRegister() {
  showOnly('registerView');
  document.getElementById('regMsg').textContent = '';
  document.getElementById('lastName').value = '';
  document.getElementById('firstName').value = '';
  // UX: 姓にフォーカス
  setTimeout(() => document.getElementById('lastName').focus(), 50);
}

function showError(msg) {
  showOnly('errorView');
  document.getElementById('errMsg').textContent = msg || '不明なエラー';
}

async function init() {
  try {
    showOnly('loadingView');

    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const accessToken = liff.getAccessToken();
    if (!accessToken) throw new Error('accessTokenが取得できません');

    // 1) userIdを照合。なければサーバ側で登録され status:new が返る想定
    const me = await post('me', { accessToken });

    if (!me || me.ok !== true) {
      throw new Error(me?.error ? `APIエラー: ${me.error}` : 'APIエラー');
    }

    // 2) 仕様:
    // - lineidが存在しない場合（status:new）→ 登録後そのまま姓名入力画面
    // - 存在する場合（status:existing）→ 会員情報表示
    if (me.status === 'new') {
      showRegister();
      return;
    }

    // 既存会員：名前/ランク/ポイント表示
    showMember(me.member);

  } catch (e) {
    console.error(e);
    showError(e?.message || String(e));
  }
}

// 初回登録ボタン処理
document.getElementById('saveBtn').addEventListener('click', async () => {
  try {
    const lastName = document.getElementById('lastName').value.trim();
    const firstName = document.getElementById('firstName').value.trim();
    const regMsg = document.getElementById('regMsg');

    regMsg.textContent = '';
    if (!lastName || !firstName) {
      regMsg.textContent = '姓・名を入力してください。';
      return;
    }

    // 二重送信防止
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '登録中…';

    const accessToken = liff.getAccessToken();
    if (!accessToken) throw new Error('accessTokenが取得できません');

    const saved = await post('registerName', { accessToken, lastName, firstName });

    if (!saved || saved.ok !== true) {
      regMsg.textContent = saved?.error ? `登録失敗: ${saved.error}` : '登録に失敗しました。';
      btn.disabled = false;
      btn.textContent = '登録する';
      return;
    }

    // APIが member を返す実装ならそれを表示。返さない場合は再度 me を呼ぶ。
    if (saved.member) {
      showMember(saved.member);
    } else {
      const me = await post('me', { accessToken });
      if (!me || me.ok !== true) throw new Error(me?.error ? `APIエラー: ${me.error}` : 'APIエラー');
      showMember(me.member);
    }

  } catch (e) {
    console.error(e);
    document.getElementById('regMsg').textContent = e?.message || String(e);
  } finally {
    const btn = document.getElementById('saveBtn');
    btn.disabled = false;
    btn.textContent = '登録する';
  }
});

init();
</script>
</body>
</html>
