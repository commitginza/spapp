<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>メンバーズカード</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif; margin: 24px; }
    .card { border: 1px solid #e5e5e5; border-radius: 14px; padding: 16px; max-width: 520px; }
    .row { display:flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f2f2f2; }
    .row:last-child { border-bottom: none; }
    input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    button { padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; }
    .mt { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="status" style="white-space:pre-wrap;font-family:monospace;"></div>

    <div id="memberView" style="display:none;">
      <h3>会員情報</h3>
      <div class="row"><div>氏名</div><div id="name"></div></div>
      <div class="row"><div>ポイント</div><div id="point"></div></div>
      <div class="row"><div>ランク</div><div id="rank"></div></div>
    </div>

    <div id="registerView" style="display:none;">
      <h3>初回登録</h3>
      <div class="mt">
        <label>姓</label>
        <input id="lastName" autocomplete="family-name" />
      </div>
      <div class="mt">
        <label>名</label>
        <input id="firstName" autocomplete="given-name" />
      </div>
      <button class="mt" id="saveBtn">登録する</button>
      <div class="mt" id="regMsg"></div>
    </div>
  </div>

<script>
const LIFF_ID = '2009200776-bffw4Fd6';
const GAS_URL = 'https://vqzc369jaa.execute-api.ap-northeast-1.amazonaws.com/member';

function log(msg) {
  const el = document.getElementById('status');
  const now = new Date().toISOString().slice(11, 19); // HH:MM:SS
  el.textContent += `[${now}] ${msg}\n`;
}

async function post(action, payload = {}) {
  log('GASへ通信中…');
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    // NOTE: no-cors は使わない（JSON読めなくなる）
    body: JSON.stringify({ action, ...payload }),
  });

  log(`GAS応答: HTTP ${res.status}`);
  const text = await res.text();   // JSONでなくても表示できるように一旦textで受ける
  log(`GAS応答本文(先頭300): ${text.slice(0,300)}`);

  // JSONに変換できる場合だけ変換
  try { return JSON.parse(text); }
  catch { throw new Error('GASがJSONを返していません'); }
}

async function init() {
  try {
    log('LIFF SDK 初期化中…');
    await liff.init({ liffId: LIFF_ID });
    log('LIFF初期化OK');

    if (!liff.isLoggedIn()) {
      log('未ログイン → loginへ');
      liff.login();
      return;
    }

    log('アクセストークン取得中…');
    const accessToken = liff.getAccessToken();
    if (!accessToken) throw new Error('accessTokenが取得できません');

    log('会員情報取得中…');
    const me = await post('me', { accessToken });
    
    log('meレスポンス全文: ' + JSON.stringify(me));
    
    if (!me.ok) {
      throw new Error('GAS me が ok:false: ' + JSON.stringify(me));
    }

    log('会員情報取得OK');
    // ここから先は既存の表示処理に戻してOK
  } catch (e) {
    log('初期化エラー詳細: ' + (e?.message || String(e)));
    // 追加でオブジェクトも見せる
    console.error(e);
  }
}

function showMember(member) {
  document.getElementById('memberView').style.display = 'block';
  document.getElementById('name').textContent = `${member.lastName} ${member.firstName}`.trim() || '-';
  document.getElementById('point').textContent = member.point ?? 0;
  document.getElementById('rank').textContent = member.rank || '-';
}

init().catch(err => {
  document.getElementById('status').textContent = '初期化エラー: ' + String(err);
});
</script>
</body>
</html>
