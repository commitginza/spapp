<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>メンバーズカード</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --radius: 22px;
      --shadow: 0 16px 40px rgba(0,0,0,.10);
      --border: rgba(255,255,255,.28);
    }

    body {
      font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7fb;
    }

    .wrap { max-width: 520px; margin: 0 auto; }

    /* ===== Member Card ===== */
    .member-card {
      position: relative;
      border-radius: var(--radius);
      padding: 18px 18px 16px 18px;
      color: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      min-height: 220px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .member-card::before{ content:""; position:absolute; inset:-40% -40% auto auto; width: 260px; height: 260px; transform: rotate(18deg); background: rgba(255,255,255,.18); border-radius: 999px; pointer-events: none; }
    .member-card::after{ content:""; position:absolute; inset:0; background: linear-gradient(135deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 55%), repeating-linear-gradient(135deg, rgba(255,255,255,.10) 0 2px, rgba(255,255,255,0) 2px 10px); opacity:.22; pointer-events:none; mix-blend-mode: soft-light; }

    .top { display:flex; align-items:flex-start; justify-content: space-between; position: relative; z-index: 1; }
    .name { font-weight: 800; letter-spacing: .02em; font-size: 18px; line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,.18); word-break: break-word; }
    .sub { font-size: 12px; opacity: .92; margin-top: 6px; }
    .center { display:flex; align-items:center; justify-content:center; position: relative; z-index: 1; }
    .rank-badge{ display:inline-flex; align-items:center; justify-content:center; padding: 16px 22px; border-radius: 999px; background: rgba(0,0,0,.18); border: 1px solid rgba(255,255,255,.26); backdrop-filter: blur(6px); font-weight: 900; letter-spacing: .08em; font-size: 24px; line-height: 1; min-width: 150px; text-shadow: 0 2px 18px rgba(0,0,0,.20); }
    .bottom { display:flex; align-items:flex-end; justify-content: space-between; position: relative; z-index: 1; gap: 10px; }
    .points { font-weight: 900; font-size: 36px; letter-spacing: .02em; text-shadow: 0 2px 12px rgba(0,0,0,.18); white-space: nowrap; }
    .points small{ font-size: 12px; opacity: .92; margin-left: 6px; font-weight: 700; letter-spacing: .06em; }

    /* ===== Notice ===== */
    .notice-section{ margin-top: 16px; }
    .section-head{ display:flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 0 2px 10px 2px; }
    .section-title{ margin: 0; font-size: 16px; font-weight: 900; color:#111; }
    .section-sub{ margin: 0; font-size: 12px; color:#666; white-space: nowrap; }
    .notice-wrap{ display: grid; gap: 10px; }
    .notice-panel{ background: #fff; border: 1px solid #e9e9ef; border-radius: 16px; padding: 14px; box-shadow: 0 10px 24px rgba(0,0,0,.06); overflow: hidden; }
    .notice-head{ display:grid; grid-template-columns: 1fr; gap: 8px; }
    .notice-title{ font-weight: 900; font-size: 16px; margin: 0; color:#111; line-height: 1.25; word-break: break-word; }
    .notice-meta{ font-size: 12px; color:#666; overflow-wrap: anywhere; }
    .notice-body{ margin-top: 10px; color:#222; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .notice-link{ margin-top: 10px; display:inline-flex; align-items:center; gap: 8px; font-size: 14px; font-weight: 800; color: #2563eb; text-decoration: none; }
    .notice-link:active{ opacity:.75; }

    /* register UI */
    .panel {
      background: #fff;
      border: 1px solid #e9e9ef;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0,0,0,.06);
    }

    label { font-size: 13px; color:#333; display:block; margin-bottom: 8px; font-weight: bold; }
    
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #d9d9e3;
      outline: none;
      font-size: 16px;
      background: #fdfdfd;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #111; }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      background: #111;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
    }
    button:disabled{ opacity:.6; cursor: not-allowed; }

    .muted { color:#666; font-size: 12px; }
    .error { color:#b00020; font-size: 13px; margin-top: 12px; text-align: center; }

    /* ===== Rank Colors (Metallic) ===== */
    .rank-a4 { background: linear-gradient(135deg, #4d2c00 0%, #7a5230 45%, #a67c52 50%, #7a5230 55%, #4d2c00 100%); }
    .rank-a3 { background: linear-gradient(135deg, #757575 0%, #9e9e9e 45%, #e8e8e8 50%, #9e9e9e 55%, #757575 100%); }
    .rank-a2 { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 50%, #fcf6ba 55%, #aa771c 100%); color: #5d4037 !important; }
    .rank-a2 .rank-badge { color: #5d4037; border-color: rgba(93,64,55,0.2); }
    .rank-a2 .sub, .rank-a2 .muted { color: rgba(93,64,55,0.8) !important; }
    .rank-a1 { background: linear-gradient(135deg, #434343 0%, #000000 45%, #2c3e50 50%, #000000 55%, #434343 100%); }
    .rank-a1 .rank-badge { border-color: rgba(255,255,255,0.4); box-shadow: 0 0 15px rgba(255,255,255,0.1); }

    .member-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.3) 45%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.3) 55%, transparent 80%); pointer-events: none; mix-blend-mode: overlay; z-index: 2; }

    #loadingView { padding: 18px 6px; }
    #registerView { display:none; }
    #memberView { display:none; }
    #noticeSection { display:none; }
    #errorView { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loadingView">
      <div class="muted">読み込み中…</div>
    </div>

    <div id="memberView">
      <div id="card" class="member-card rank-a4">
        <div class="top">
          <div>
            <div class="name" id="name">-</div>
            <div class="sub muted" style="color:rgba(255,255,255,.92)">Members Card</div>
          </div>
        </div>
        <div class="center">
          <div class="points" id="points">0 <small>P</small></div>
        </div>
        <div class="bottom">
          <div class="rank-badge" id="rankBadge" style="font-size: 24px; min-width: 80px; padding: 8px 16px;">A4</div>
          <div class="muted" style="color:rgba(255,255,255,.92); white-space:nowrap;">Football Assist</div>
        </div>
      </div>
      <div id="noticeSection" class="notice-section">
        <div class="section-head">
          <h3 class="section-title">お知らせ</h3>
        </div>
        <div id="noticeView" class="notice-wrap"></div>
      </div>
    </div>

    <div id="registerView" class="panel">
      <h2 style="margin:0 0 8px 0; font-size: 20px;">初回登録</h2>
      <div class="muted" style="margin-bottom: 24px;">はじめに氏名をご入力ください。</div>
      <div style="margin-top:16px;">
        <label>姓</label>
        <input id="lastName" placeholder="例：山田" autocomplete="family-name" />
      </div>
      <div style="margin-top:16px;">
        <label>名</label>
        <input id="firstName" placeholder="例：太郎" autocomplete="given-name" />
      </div>
      <button id="saveBtn">登録する</button>
      <div id="regMsg" class="error"></div>
    </div>

    <div id="errorView" class="panel">
      <div class="error" style="margin-top:0;">エラーが発生しました</div>
      <div id="errMsg" class="muted" style="margin-top:8px;"></div>
    </div>
  </div>

<script>
const LIFF_ID = '2009200776-bffw4Fd6';
const API_URL = 'https://vqzc369jaa.execute-api.ap-northeast-1.amazonaws.com/member';

function showOnly(viewId) {
  const ids = ['loadingView', 'memberView', 'registerView', 'errorView'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = (id === viewId) ? 'block' : 'none';
  });
}

async function post(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload }),
  });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { throw new Error('APIがJSONを返していません'); }
}

function normalizeRank(rank) {
  const r = (rank || '').toString().trim().toUpperCase();
  return ['A1','A2','A3','A4'].includes(r) ? r : 'A4';
}

function rankClass(rank) {
  switch (rank) {
    case 'A1': return 'rank-a1';
    case 'A2': return 'rank-a2';
    case 'A3': return 'rank-a3';
    case 'A4': 
    default:   return 'rank-a4';
  }
}

function renderCard(member) {
  const last = (member?.lastName || '').trim();
  const first = (member?.firstName || '').trim();
  const fullName = `${last} ${first}`.trim() || '-';
  const pointVal = (member?.point ?? 0);
  const pointNum = Number.isFinite(Number(pointVal)) ? Number(pointVal) : 0;
  const formattedPoints = pointNum.toLocaleString();
  const rank = normalizeRank(member?.rank);
  const card = document.getElementById('card');
  card.classList.remove('rank-a1','rank-a2','rank-a3','rank-a4');
  card.classList.add(rankClass(rank));
  document.getElementById('name').textContent = fullName;
  document.getElementById('rankBadge').textContent = rank;
  document.getElementById('points').innerHTML = `${formattedPoints} <small>P</small>`;
}

function showRegister() {
  showOnly('registerView');
  document.getElementById('regMsg').textContent = '';
  document.getElementById('lastName').value = '';
  document.getElementById('firstName').value = '';
  setTimeout(() => document.getElementById('lastName').focus(), 50);
}

function showError(msg) {
  showOnly('errorView');
  document.getElementById('errMsg').textContent = msg || '不明なエラー';
}

function fmtPeriod(startAt, endAt) {
  const s = (startAt || '').toString().trim();
  const e = (endAt || '').toString().trim();
  if (!s && !e) return '';
  if (s && e) return `${s} 〜 ${e}`;
  if (s) return `${s} 〜`;
  return `〜 ${e}`;
}

function escapeHtml(str) {
  return String(str ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
}

function safeUrl(url) {
  const u = (url || '').toString().trim();
  if (!u) return '';
  if (u.startsWith('http://') || u.startsWith('https://')) return u;
  return '';
}

function renderNotices(notices) {
  const section = document.getElementById('noticeSection');
  const wrap = document.getElementById('noticeView');
  wrap.innerHTML = '';
  if (!Array.isArray(notices) || notices.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  const list = notices.slice(0, 3);
  list.forEach(n => {
    const title = escapeHtml(n.title || 'お知らせ');
    const body = escapeHtml(n.body || '');
    const url = safeUrl(n.url);
    const period = escapeHtml(fmtPeriod(n.startAt, n.endAt));
    const panel = document.createElement('div');
    panel.className = 'notice-panel';
    panel.innerHTML = `
      <div class="notice-head">
        ${period ? `<div class="notice-meta">掲載期間: ${period}</div>` : ``}
        <h4 class="notice-title">${title}</h4>
      </div>
      ${body ? `<div class="notice-body">${body}</div>` : ``}
      ${url ? `<a class="notice-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">詳細を見る</a>` : ``}
    `;
    wrap.appendChild(panel);
  });
}

async function fetchAndRenderNotices(accessToken) {
  try {
    const noticeRes = await post('notices', { accessToken });
    renderNotices(noticeRes?.ok === true ? (noticeRes.notices || []) : []);
  } catch (_) { renderNotices([]); }
}

async function init() {
  try {
    showOnly('loadingView');
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const accessToken = liff.getAccessToken();
    if (!accessToken) throw new Error('accessTokenが取得できません');
    const me = await post('me', { accessToken });
    if (!me || me.ok !== true) throw new Error(me?.error ? `APIエラー: ${me.error}` : 'APIエラー');

    // --- 修正箇所：姓名が未設定の場合も登録画面を表示 ---
    const hasName = (me.member?.lastName || '').trim() !== '' && (me.member?.firstName || '').trim() !== '';
    if (me.status === 'new' || !hasName) {
      showRegister();
      return;
    }
    // ---------------------------------------------------

    showOnly('memberView');
    renderCard(me.member);
    await fetchAndRenderNotices(accessToken);
  } catch (e) {
    console.error(e);
    showError(e?.message || String(e));
  }
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  try {
    const lastName = document.getElementById('lastName').value.trim();
    const firstName = document.getElementById('firstName').value.trim();
    const regMsg = document.getElementById('regMsg');
    regMsg.textContent = '';
    if (!lastName || !firstName) {
      regMsg.textContent = '姓・名を入力してください。';
      return;
    }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '登録中…';
    const accessToken = liff.getAccessToken();
    const saved = await post('registerName', { accessToken, lastName, firstName });
    if (!saved || saved.ok !== true) {
      regMsg.textContent = saved?.error ? `登録失敗: ${saved.error}` : '登録に失敗しました。';
      btn.disabled = false;
      btn.textContent = '登録する';
      return;
    }
    let member = saved.member;
    if (!member) {
      const me = await post('me', { accessToken });
      member = me.member;
    }
    showOnly('memberView');
    renderCard(member);
    await fetchAndRenderNotices(accessToken);
  } catch (e) {
    document.getElementById('regMsg').textContent = e?.message || String(e);
  } finally {
    const btn = document.getElementById('saveBtn');
    btn.disabled = false;
    btn.textContent = '登録する';
  }
});

init();
</script>
</body>
</html>
