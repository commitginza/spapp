<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>ASSIST FAMMILY</title>
  
  <script>
    window.onerror = function(msg, url, line) {
        alert("エラーが発生しました: " + msg + "\n行: " + line);
    };
  </script>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --radius: 22px;
      --shadow: 0 16px 40px rgba(0,0,0,.10);
      --border: rgba(255,255,255,.28);
    }

    body {
      font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
      margin: 0;
      padding: 0; 
      background: #f6f7fb;
    }

    .wrap { max-width: 520px; margin: 0 auto; padding: 24px; }

    /* ===== Member Card ===== */
    .member-card {
      position: relative;
      border-radius: var(--radius);
      padding: 18px 18px 16px 18px;
      color: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      min-height: 220px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .member-card::before{ content:""; position:absolute; inset:-40% -40% auto auto; width: 260px; height: 260px; transform: rotate(18deg); background: rgba(255,255,255,.18); border-radius: 999px; pointer-events: none; }
    .member-card::after{ content:""; position:absolute; inset:0; background: linear-gradient(135deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 55%), repeating-linear-gradient(135deg, rgba(255,255,255,.10) 0 2px, rgba(255,255,255,0) 2px 10px); opacity:.22; pointer-events:none; mix-blend-mode: soft-light; }

    .top { display:flex; align-items:flex-start; justify-content: space-between; position: relative; z-index: 1; }
    .name { font-weight: 800; letter-spacing: .02em; font-size: 18px; line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,.18); word-break: break-word; }
    .sub { font-size: 12px; opacity: .92; margin-top: 6px; }
    .center { display:flex; align-items:center; justify-content:center; position: relative; z-index: 1; }
    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 6px 14px; border-radius: 999px; background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.26); backdrop-filter: blur(6px);
      font-weight: 900; letter-spacing: .08em; font-size: 20px; line-height: 1;
      text-shadow: 0 2px 18px rgba(0,0,0,.20);
    }
    .bottom { display:flex; align-items:flex-end; justify-content: space-between; position: relative; z-index: 1; gap: 10px; }
    .points { font-weight: 900; font-size: 36px; letter-spacing: .02em; text-shadow: 0 2px 12px rgba(0,0,0,.18); white-space: nowrap; }
    .points small { font-size: 13px; opacity: .85; margin-left: 6px; font-weight: 700; letter-spacing: .1em; }

    /* ===== Notice / Other UI ===== */
    .notice-section{ margin-top: 16px; }
    .section-head{ display:flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 0 2px 10px 2px; }
    .section-title{ margin: 0; font-size: 16px; font-weight: 900; color:#111; }
    .notice-wrap{ display: grid; gap: 10px; }
    .notice-panel{ background: #fff; border: 1px solid #e9e9ef; border-radius: 16px; padding: 14px; box-shadow: 0 10px 24px rgba(0,0,0,.06); overflow: hidden; }
    .notice-head{ display:grid; grid-template-columns: 1fr; gap: 8px; }
    .notice-title{ font-weight: 900; font-size: 16px; margin: 0; color:#111; line-height: 1.25; }
    .notice-meta{ font-size: 12px; color:#666; }
    .notice-body{ margin-top: 10px; color:#222; font-size: 14px; line-height: 1.7; white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    
    .panel { background: #fff; border: 1px solid #e9e9ef; border-radius: 16px; padding: 24px; box-shadow: 0 10px 24px rgba(0,0,0,.06); }
    label { font-size: 13px; color:#333; display:block; margin-bottom: 8px; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; padding: 14px 16px; border-radius: 10px; border: 1px solid #d9d9e3; outline: none; font-size: 16px; background: #fdfdfd; transition: border-color 0.2s; }
    input:focus { border-color: #111; }
    
    .btn-primary {
      width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer;
      background: #111; color: #fff; font-weight: 800; font-size: 16px; margin-top: 20px;
      transition: background 0.3s;
    }
    .btn-primary:disabled{ opacity:.6; cursor: not-allowed; }

    /* ガチャ起動ボタン */
    .btn-gacha {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
      margin-top: 20px;
    }
    .btn-gacha:disabled {
      background: #9ca3af;
      box-shadow: none;
      color: #f3f4f6;
    }

    .muted { color:#666; font-size: 12px; }
    .error { color:#b00020; font-size: 13px; margin-top: 12px; text-align: center; }

    /* ===== Rank Colors ===== */
    .rank-a4 { background: linear-gradient(135deg, #4d2c00 0%, #7a5230 45%, #a67c52 50%, #7a5230 55%, #4d2c00 100%); }
    .rank-a3 { background: linear-gradient(135deg, #757575 0%, #9e9e9e 45%, #e8e8e8 50%, #9e9e9e 55%, #757575 100%); }
    .rank-a2 { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 50%, #fcf6ba 55%, #aa771c 100%); color: #5d4037 !important; }
    .rank-a2 .rank-badge { color: #5d4037; border-color: rgba(93,64,55,0.2); }
    .rank-a2 .sub, .rank-a2 .muted { color: rgba(93,64,55,0.8) !important; }
    .rank-a1 { background: linear-gradient(135deg, #434343 0%, #000000 45%, #2c3e50 50%, #000000 55%, #434343 100%); }

    /* Loader */
    #loadingView { padding: 40px 6px; text-align: center; }
    .loader { width: 32px; height: 32px; border: 3px solid rgba(0,0,0,.1); border-top-color: #111; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 修正箇所: loadingViewは最初から表示させる */
    #registerView, #memberView, #errorView, #gachaView { display:none; }

    /* ==========================================
       ガチャ用スタイル (全画面)
    ========================================== */
    #gachaView {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000 url('./fair_play_bg.jpg') no-repeat center bottom / cover;
        z-index: 1000; flex-direction: column; align-items: center; overflow: hidden;
    }
    .gacha-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
    .gacha-header { position: relative; z-index: 10; width: 100%; display: flex; justify-content: flex-end; padding: 15px; box-sizing: border-box; }
    .gacha-close { background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.5); padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    .pk-area { position: relative; z-index: 5; flex-grow: 1; width: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 30px; }
    .goal {
        position: absolute; bottom: 31%; width: 80%; max-width: 340px; height: 120px;
        border: 4px solid #fff; border-bottom: none;
        background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.3) 10px, rgba(255,255,255,0.3) 12px),
                    repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(255,255,255,0.3) 10px, rgba(255,255,255,0.3) 12px);
        z-index: 1; transition: transform 0.1s;
    }
    .ball {
        position: absolute; bottom: 7%; width: 180px; height: 180px;
        background: url('./ball.png') no-repeat center / contain;
        filter: drop-shadow(0 10px 5px rgba(0,0,0,0.6)); z-index: 10;
        animation: float 2s infinite ease-in-out;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes chargeRumble { 0% { transform: translate(2px, 1px) rotate(0deg); } 25% { transform: translate(-2px, -1px) rotate(-1deg); } 50% { transform: translate(0px, 2px) rotate(1deg); } 75% { transform: translate(-1px, -2px) rotate(0deg); } 100% { transform: translate(1px, 0px) rotate(-1deg); } }
    .ball.charging { animation: chargeRumble 0.1s infinite; filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.9)); }
    .ball.shoot-win { animation: none; transform: translate(0, -10vh) scale(0.2) rotate(1080deg); transition: transform 2s cubic-bezier(0.1, 0.7, 0.3, 1); }
    .ball.shoot-lose { animation: none; transform: translate(-38vw, -25vh) scale(0.25) rotate(720deg); transition: transform 2s cubic-bezier(0.1, 0.7, 0.3, 1); }
    .ball.shoot-lose-drop { transform: translate(-38vw, -10vh) scale(0.25) rotate(180deg); transition: transform 0.8s cubic-bezier(0.5, 0, 1, 1); }
    .goal.shake { animation: netShake 0.4s ease-in-out; }
    @keyframes netShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) scaleY(1.02); } 75% { transform: translateX(5px) scaleY(0.98); } }

    .shoot-btn {
        position: relative; z-index: 20; background: linear-gradient(to bottom, #ef4444, #dc2626); color: white; border: 2px solid #b91c1c;
        padding: 15px 0; width: 80%; max-width: 300px; font-size: 20px; font-weight: bold; border-radius: 30px;
        box-shadow: 0 6px 0 #991b1b, 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 40px; cursor: pointer; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    .shoot-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 #991b1b, 0 4px 10px rgba(0,0,0,0.5); }
    .shoot-btn:disabled { background: #6b7280; border-color: #4b5563; box-shadow: 0 6px 0 #374151; cursor: not-allowed; }

    .gacha-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85);
        display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; transition: 0.3s; z-index: 100;
    }
    .gacha-modal.show { opacity: 1; visibility: visible; }
    .gacha-modal-content { background: #fff; padding: 30px; border-radius: 15px; text-align: center; width: 80%; max-width: 320px; transform: scale(0.8); transition: 0.3s; }
    .gacha-modal.show .gacha-modal-content { transform: scale(1); }
    .result-text { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
    .win-text { color: #dc2626; } .lose-text { color: #4b5563; }
    .point-text { font-size: 24px; color: #d97706; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loadingView">
      <div class="loader"></div>
      <div class="muted">読み込み中…</div>
    </div>

    <div id="memberView">
      <div id="card" class="member-card rank-a4">
        <div class="top">
          <div>
            <div class="name" id="name">-</div>
            <div class="sub muted" style="color:rgba(255,255,255,.92)">Assist Family</div>
          </div>
        </div>
        <div class="center">
          <div class="points" id="points">0 <small>POINTS</small></div>
        </div>
        <div class="bottom">
          <div class="rank-badge" id="rankBadge">A4</div>
          <div class="muted" style="color:rgba(255,255,255,.92); white-space:nowrap;">Football Assist</div>
        </div>
      </div>
      
      <button id="openGachaBtn" class="btn-primary btn-gacha" onclick="openGacha()">⚽️ フェアプレー賞 限定PKに挑戦！</button>

      <div id="noticeSection" class="notice-section">
        <div class="section-head"><h3 class="section-title">お知らせ</h3></div>
        <div id="noticeView" class="notice-wrap"></div>
      </div>
    </div>

    <div id="registerView" class="panel">
      <h2 style="margin:0 0 8px 0; font-size: 20px;">初回登録</h2>
      <div class="muted" style="margin-bottom: 24px;">はじめに氏名をご入力ください。</div>
      <div style="margin-top:16px;">
        <label>姓</label><input id="lastName" placeholder="例：山田" autocomplete="family-name" />
      </div>
      <div style="margin-top:16px;">
        <label>名</label><input id="firstName" placeholder="例：太郎" autocomplete="given-name" />
      </div>
      <button id="saveBtn" class="btn-primary">登録する</button>
      <div id="regMsg" class="error"></div>
    </div>

    <div id="errorView" class="panel">
      <div class="error" style="margin-top:0;">エラーが発生しました</div>
      <div id="errMsg" class="muted" style="margin-top:8px;"></div>
    </div>
  </div>

  <div id="gachaView">
      <div class="gacha-overlay"></div>
      <div class="gacha-header">
          <button class="gacha-close" onclick="closeGacha()">✕ 閉じる</button>
      </div>
      <div class="pk-area">
          <div class="goal" id="goal"></div>
          <div class="ball" id="ball"></div>
      </div>
      <button class="shoot-btn" id="shootBtn">シュート！</button>

      <div class="gacha-modal" id="gachaModal">
          <div class="gacha-modal-content">
              <div id="gachaResult"></div>
              <button class="btn-primary" style="margin-top: 20px;" onclick="closeGachaAndReload()">会員証へ戻る</button>
          </div>
      </div>
  </div>

<script>
const LIFF_ID = '2009200776-bffw4Fd6';
const API_URL = 'https://vqzc369jaa.execute-api.ap-northeast-1.amazonaws.com/member';

function showOnly(viewId) {
  const ids = ['loadingView', 'memberView', 'registerView', 'errorView', 'gachaView'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
        if(id === viewId) {
            el.style.display = (id === 'gachaView') ? 'flex' : 'block';
        } else {
            el.style.display = 'none';
        }
    }
  });
}

async function post(action, payload = {}, retries = 1) {
  try {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), 10000); 
    const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...payload }), signal: controller.signal });
    clearTimeout(id);
    if (!res.ok) throw new Error(`サーバーエラー: ${res.status}`);
    return await res.json();
  } catch (err) {
    if (retries > 0) return post(action, payload, retries - 1); 
    throw err;
  }
}

function normalizeRank(rank) { return ['A1','A2','A3','A4'].includes((rank || '').toString().trim().toUpperCase()) ? (rank || '').toString().trim().toUpperCase() : 'A4'; }
function rankClass(rank) { switch (rank) { case 'A1': return 'rank-a1'; case 'A2': return 'rank-a2'; case 'A3': return 'rank-a3'; default: return 'rank-a4'; } }

function renderCard(member) {
  const fullName = `${(member?.lastName || '').trim()} ${(member?.firstName || '').trim()}`.trim() || '-';
  const pointNum = Number.isFinite(Number(member?.point ?? 0)) ? Number(member?.point ?? 0) : 0;
  const rank = normalizeRank(member?.rank);
  const card = document.getElementById('card');
  card.classList.remove('rank-a1','rank-a2','rank-a3','rank-a4'); card.classList.add(rankClass(rank));
  document.getElementById('name').textContent = fullName;
  document.getElementById('rankBadge').textContent = rank;
  document.getElementById('points').innerHTML = `${pointNum.toLocaleString()} <small>POINTS</small>`;
  
  // ▼ H列、I列の判定に基づくボタン制御
  const gachaBtn = document.getElementById('openGachaBtn');
  
  if (!member?.isEligible) {
      // H列に値がない（対象外）場合は、ボタン自体を完全に隠す
      gachaBtn.style.display = 'none';
  } else {
      // H列に値がある（対象者）場合はボタンを表示
      gachaBtn.style.display = 'block';
      
      if (member?.hasPlayedGacha) {
          // I列に値がある（実行済み）場合
          gachaBtn.disabled = true;
          gachaBtn.innerText = '⚽️ ガチャは挑戦済みです';
      } else {
          // I列に値がない（未挑戦）場合
          gachaBtn.disabled = false;
          gachaBtn.innerText = '⚽️ フェアプレー賞 限定PKに挑戦！';
      }
  }
}

function showRegister() { showOnly('registerView'); document.getElementById('regMsg').textContent = ''; document.getElementById('lastName').value = ''; document.getElementById('firstName').value = ''; }
function showError(msg) { showOnly('errorView'); document.getElementById('errMsg').textContent = msg || '不明なエラー'; }
function fmtPeriod(s, e) { if (!s && !e) return ''; if (s && e) return `${s} 〜 ${e}`; if (s) return `${s} 〜`; return `〜 ${e}`; }
function escapeHtml(str) { return String(str ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;'); }
function safeUrl(u) { if (!u) return ''; if (u.startsWith('http://') || u.startsWith('https://')) return u; return ''; }

function renderNotices(notices) {
  const section = document.getElementById('noticeSection'); const wrap = document.getElementById('noticeView'); wrap.innerHTML = '';
  if (!Array.isArray(notices) || notices.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  notices.slice(0, 3).forEach(n => {
    const period = escapeHtml(fmtPeriod(n.startAt, n.endAt));
    wrap.innerHTML += `
      <div class="notice-panel">
        <div class="notice-head">${period ? `<div class="notice-meta">掲載期間: ${period}</div>` : ``}<h4 class="notice-title">${escapeHtml(n.title || 'お知らせ')}</h4></div>
        ${n.body ? `<div class="notice-body">${escapeHtml(n.body)}</div>` : ``}
        ${safeUrl(n.url) ? `<a class="notice-link" href="${escapeHtml(safeUrl(n.url))}" target="_blank">詳細を見る</a>` : ``}
      </div>`;
  });
}

async function fetchAndRenderNotices(accessToken) {
  try { const noticeRes = await post('notices', { accessToken }); renderNotices(noticeRes?.ok === true ? (noticeRes.notices || []) : []); } catch (_) { renderNotices([]); }
}

async function init() {
  try {
    showOnly('loadingView');
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: location.href }); return; }
    const accessToken = liff.getAccessToken();
    if (!accessToken) { showError("認証情報の取得に失敗しました。"); return; }
    
    const me = await post('me', { accessToken });
    if (me?.error === "invalid_token") { liff.logout(); liff.login(); return; }
    if (!me || me.ok !== true) throw new Error(me?.error || '会員情報の取得に失敗しました');

    const hasName = (me.member?.lastName || '').trim() !== '' && (me.member?.firstName || '').trim() !== '';
    if (me.status === 'new' || !hasName) { showRegister(); return; }

    showOnly('memberView');
    renderCard(me.member);
    await fetchAndRenderNotices(accessToken);
  } catch (e) { 
    console.error(e); 
    showError("通信エラーが発生しました: " + e.message); 
  }
}

document.getElementById('saveBtn').addEventListener('click', async () => {
    try {
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const regMsg = document.getElementById('regMsg');
        regMsg.textContent = '';
        if (!lastName || !firstName) { regMsg.textContent = '姓・名を入力してください。'; return; }
        const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.textContent = '登録中…';
        const accessToken = liff.getAccessToken();
        const saved = await post('registerName', { accessToken, lastName, firstName });
        if (!saved || saved.ok !== true) { regMsg.textContent = saved?.error ? `登録失敗: ${saved.error}` : '登録に失敗しました。'; btn.disabled = false; btn.textContent = '登録する'; return; }
        let member = saved.member;
        if (!member) { const me = await post('me', { accessToken }); member = me.member; }
        showOnly('memberView'); renderCard(member); await fetchAndRenderNotices(accessToken);
    } catch (e) {
        document.getElementById('regMsg').textContent = e?.message || String(e);
    } finally {
        const btn = document.getElementById('saveBtn'); btn.disabled = false; btn.textContent = '登録する';
    }
});

const ball = document.getElementById('ball');
const goal = document.getElementById('goal');
const shootBtn = document.getElementById('shootBtn');
const gachaModal = document.getElementById('gachaModal');
const gachaResult = document.getElementById('gachaResult');

function openGacha() {
    showOnly('gachaView');
    ball.className = 'ball'; 
    gachaModal.classList.remove('show');
    shootBtn.disabled = false;
    shootBtn.innerText = 'シュート！';
}

function closeGacha() {
    showOnly('memberView');
}

function closeGachaAndReload() {
    closeGacha();
    init(); 
}

shootBtn.addEventListener('click', async () => {
    shootBtn.disabled = true;
    shootBtn.innerText = '運命の判定...';
    ball.classList.add('charging');

    let isWin = false;

    try {
        const accessToken = liff.getAccessToken();
        const [apiRes] = await Promise.all([
            post('playGacha', { accessToken }), 
            new Promise(resolve => setTimeout(resolve, 2000))
        ]);

        if (apiRes && apiRes.ok === false && apiRes.error === 'already_played') {
            alert('すでにガチャに挑戦済みです。');
            closeGachaAndReload();
            return;
        }

        if (apiRes && apiRes.ok && apiRes.isWin) {
            isWin = true;
        }

    } catch (e) {
        console.error("ガチャAPIエラー", e);
        alert("通信エラーが発生しました。");
        closeGacha();
        return;
    }

    ball.classList.remove('charging');
    shootBtn.innerText = 'シュート！！';

    if (isWin) {
        ball.classList.add('shoot-win');
        setTimeout(() => { if (goal) goal.classList.add('shake'); }, 1800);
        setTimeout(() => {
            gachaResult.innerHTML = `
                <div class="result-text win-text">GOAL!!</div>
                <div class="point-text">10,000 pt 獲得</div>
                <p style="color: #666; font-size: 14px;">見事なシュートです！</p>
            `;
            gachaModal.classList.add('show');
        }, 2500);
    } else {
        ball.classList.add('shoot-lose');
        setTimeout(() => { ball.classList.add('shoot-lose-drop'); }, 2000);
        setTimeout(() => {
            gachaResult.innerHTML = `
                <div class="result-text lose-text">MISS...</div>
                <div class="point-text" style="color: #666;">0 pt</div>
                <p style="color: #666; font-size: 14px;">ポストに嫌われました。<br>次回に期待！</p>
            `;
            gachaModal.classList.add('show');
        }, 3000);
    }
});

// 初期化実行
init();
</script>
</body>
